# migration-tooling/config/repo-manifest.yaml
# Generated by inventory.sh — edit wave assignments and metadata before migrating.
#
# DUAL-ORG MODEL: Not all repos migrate. Some stay in the old org permanently.
# Repos in the new org may source modules from repos that stay in the old org.
#
# wave: 0 = unassigned, 1 = canary, 2 = AFT customizations, 3 = AFT core, 4 = pipelines
# status: pending | migrating | migrated | failed | skip (stays in old org)
# type: aft-core | aft-customization | module | pipeline | governance | other
# migrate: true = moving to new org, false = staying in old org

repos: []
# Run inventory.sh to populate this file
#
# After populating, mark repos that are NOT migrating:
#   status: skip
#   migrate: false
#
# The migrate-repo.sh script uses this to identify cross-org references
# that should NOT be replaced (they point to repos staying in the old org).
